<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plotter Console</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1>Plotter Console</h1>
  <span id="status">Disconnected</span>
  <span id="queue-status"></span>
  <span class="spacer"></span>
  <button id="pause-btn" class="btn-lg" onclick="togglePause()">Pause</button>
  <button class="danger btn-lg" onclick="emergencyStop()">STOP</button>
  <button onclick="resetPrinter()">Reset</button>
</header>

<div id="progress-bar-wrap" class="progress-bar">
  <div id="progress-bar-fill" class="progress-bar__fill"></div>
  <span id="progress-bar-text" class="progress-bar__text"></span>
</div>

<!-- Preview column -->
<div id="preview-col">
  <div id="preview-wrap">
    <canvas id="preview" width="400" height="400"></canvas>
    <div id="preview-controls">
      <button onclick="zoomIn()" title="Zoom In">+</button>
      <button onclick="zoomOut()" title="Zoom Out">&minus;</button>
      <button onclick="zoomReset()" title="Reset View">&#8634;</button>
    </div>
  </div>
</div>

<!-- Terminal column -->
<div id="terminal-col">
  <div id="console"></div>
  <div id="quick-bar">
    <button onclick="send('G28')">Home All</button>
    <button onclick="send('G28 X')">Home X</button>
    <button onclick="send('G28 Y')">Home Y</button>
    <button onclick="send('G28 Z')">Home Z</button>
    <button onclick="send('M114')">Position</button>
    <button onclick="send('M105')">Temps</button>
    <button onclick="send('M84')">Motors Off</button>
    <button onclick="send('M503')">Settings</button>
  </div>
  <div id="input-row">
    <input type="text" id="cmd-input" placeholder="Type G-code command..." autocomplete="off" spellcheck="false">
    <button class="primary" onclick="sendInput()">Send</button>
  </div>
</div>

<!-- Right column: tabbed panels -->
<div id="right-col">
  <div id="panel-tabs">
    <button class="tab-btn active" data-tab="workflow" onclick="switchTab('workflow')">Workflow</button>
    <button class="tab-btn" data-tab="config" onclick="switchTab('config')">Configuration</button>
  </div>

  <div id="tab-workflow" class="tab-content active">
    <div class="panel">
      <h2>SVG Import</h2>
      <input type="file" id="svg-file-input" accept=".svg">
      <label id="svg-file-label" onclick="document.getElementById('svg-file-input').click()">Choose SVG File</label>
      <div id="svg-info"></div>
      <div id="svg-load-progress" class="progress-bar progress-bar--sm">
        <div id="svg-load-fill" class="progress-bar__fill"></div>
        <span id="svg-load-text" class="progress-bar__text"></span>
      </div>
      <label>Offset X (mm) <input type="number" id="svg-ox" value="10" min="0" step="1"></label>
      <label>Offset Y (mm) <input type="number" id="svg-oy" value="10" min="0" step="1"></label>
      <label>Scale <input type="number" id="svg-scale" value="1" min="0.01" step="0.1"></label>
      <label>Speed <input type="number" id="svg-speed" value="1500" min="100" step="100"></label>
      <label>Resolution (mm) <input type="number" id="svg-res" value="0.5" min="0.1" step="0.1"></label>
      <label>Simplify (mm) <input type="number" id="svg-simplify" value="0.2" min="0" step="0.05"></label>
      <label>Merge gap (mm) <input type="number" id="svg-merge" value="1" min="0" step="0.5"></label>
      <button onclick="fitToBed()">Fit to Bed</button>
      <button class="primary" onclick="plotSvg()">Plot SVG</button>
      <button onclick="clearSvg()">Clear</button>
      <div id="svg-warn" class="warn"></div>
      <div class="info-text">Simplify: remove points within this tolerance. Merge: join paths closer than this gap. Both reduce commands.</div>
    </div>

    <div class="panel" id="move-panel">
      <h2 id="move-panel-title">Move / Circle</h2>
      <div class="flex-row">
        <button id="mode-move" onclick="setMoveMode('move')">Move To</button>
        <button id="mode-circle" class="primary" onclick="setMoveMode('circle')">Circle</button>
      </div>
      <label>X <input type="number" id="move-x" value="150" min="0" step="1"></label>
      <label>Y <input type="number" id="move-y" value="150" min="0" step="1"></label>
      <label id="radius-label">Radius <input type="number" id="circle-r" value="20" min="1" step="1"></label>
      <label>Speed <input type="number" id="move-f" value="1000" min="100" step="100"></label>
      <button class="primary" id="move-action-btn" onclick="doMoveAction()">Draw Circle</button>
      <div id="move-warn" class="warn"></div>
    </div>
  </div>

  <div id="tab-config" class="tab-content">
    <div class="panel">
      <h2>Bed</h2>
      <label>X (mm) <input type="number" id="bed-x" value="300" min="1" step="1"></label>
      <label>Y (mm) <input type="number" id="bed-y" value="300" min="1" step="1"></label>
      <label>Padding (mm) <input type="number" id="bed-padding" value="15" min="0" step="1"></label>
    </div>

    <div class="panel">
      <h2>Pen Control</h2>
      <label>Up Z (mm) <input type="number" id="pen-up-z" value="2" min="0" step="0.5"></label>
      <label>Down Z (mm) <input type="number" id="pen-down-z" value="0" min="0" step="0.1"></label>
      <label>Z Speed <input type="number" id="pen-z-speed" value="300" min="50" step="50"></label>
      <button class="primary" onclick="penUp()">Pen Up</button>
      <button class="primary" onclick="penDown()">Pen Down</button>
    </div>

    <div class="panel">
      <h2>Speed Override</h2>
      <label>Feed Rate % <input type="number" id="speed-pct" value="100" min="10" max="500" step="10"></label>
      <button onclick="setSpeed(50)">50%</button>
      <button onclick="setSpeed(75)">75%</button>
      <button class="primary" onclick="setSpeed(100)">100%</button>
      <button onclick="setSpeed(125)">125%</button>
      <button onclick="setSpeed(150)">150%</button>
      <button onclick="applySpeed()">Apply</button>
      <div class="info-text">M220: applies immediately to current and queued moves.</div>
    </div>
  </div>
</div>

<script src="/static/plotter.js"></script>
<script src="/static/preview.js"></script>
<script src="/static/app.js"></script>

</body>
</html>
